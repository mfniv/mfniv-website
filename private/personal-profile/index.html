<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>Personal Profile | Private</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f17;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --line: rgba(34, 197, 94, 0.3);
      --accent: #86efac;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top left, rgba(34, 197, 94, 0.11), transparent 50%), var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 2.8vw, 2.4rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .badge {
      display: inline-block;
      margin-bottom: 16px;
      border: 1px solid rgba(134, 239, 172, 0.55);
      color: #dcfce7;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .assets {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 1px solid rgba(156, 163, 175, 0.2);
      display: grid;
      gap: 12px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Private share page</div>
    <h1>Personal Profile</h1>
    <p>
      This page is intended for private sharing with prospective employers.
      Replace the placeholder assets below with your latest personal bio and contact materials.
    </p>

    <section class="assets">
      <a href="./personal-bio.pdf">Personal profile / bio (PDF)</a>
      <a href="./personal-contact.vcf">Personal contact card (.VCF)</a>
    </section>
  </main>
</body>
</html>
